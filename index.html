<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BSCrim Attendance</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1f3a;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 500px;
  margin: auto;
  background: #122b4d;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.item {
  background: #1c3b66;
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  text-align: left;
}

small {
  float:right;
  color:#ccc;
}
</style>
</head>

<body>

<div class="box">
  <h2>BSCrim Attendance (Live)</h2>

  <input type="text" id="name" placeholder="Enter Full Name">
  <br>
  <button onclick="submit()">Submit</button>

  <p>Total: <span id="total">0</span></p>

  <input type="text" id="search" onkeyup="render()" placeholder="Search name">

  <div id="list"></div>
</div>

<script>
  // 🔥 PASTE FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "AIzaSyAyDz90NKwJo1skvjqfiMi26PMRSQszXT8",
    authDomain: "attendancesheet-5fc9d.firebaseapp.com",
    projectId: "attendancesheet-5fc9d",
    storageBucket: "attendancesheet-5fc9d.firebasestorage.app",
    messagingSenderId: "970124050923",
    appId: "1:970124050923:web:56b7486aeb6081a8e099ae"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const col = db.collection("attendance");

  function submit() {
    let name = document.getElementById("name").value.trim();
    if (!name) return;

    col.add({
      name: name,
      time: new Date().toLocaleTimeString()
    });

    document.getElementById("name").value = "";
  }

let data = [];

function addName() {
  let input = document.getElementById("name");
  let name = input.value.trim();

  if (!name) return;

  data.push({
    name: name,
    time: new Date().toLocaleTimeString()
  });

  input.value = "";
  render();
}

function render() {
  let list = document.getElementById("list");
  let count = document.getElementById("count");

  list.innerHTML = "";

  data.sort((a, b) => a.name.localeCompare(b.name));

  data.forEach(d => {
    list.innerHTML += `
      <div class="item">
        ${d.name}
        <small>${d.time}</small>
      </div>
    `;
  });

  count.innerText = data.length;
}
</script>

</body>
</html>
